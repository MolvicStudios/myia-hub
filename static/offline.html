<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyIA Hub — Sin conexión</title>
<style>
  body { margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  .box { text-align: center; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  p { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1.5rem; }
  button { background: #3b82f6; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; }
  button:hover { background: #2563eb; }
</style>
</head>
<body>
<div class="box">
  <div style="font-size:3rem;margin-bottom:1rem;">📡</div>
  <h1>Sin conexión</h1>
  <p>No se puede conectar a internet. Tus conversaciones están guardadas localmente y estarán disponibles cuando vuelvas a conectarte.</p>
  <button onclick="location.reload()">Reintentar</button>
</div>
</body>
</html>
